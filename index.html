<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lehyan Nouioui-Chared — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,400&family=JetBrains+Mono:wght@300;400;600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
/* =============== RESET & BASE =============== */
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #f4f1ea;           /* crème chaud */
  --bg-2: #ffffff;         /* blanc pur */
  --bg-card: #ffffff;
  --bg-dark: #0a0e1a;      /* sections sombres pour rythme */
  --ink: #0a0e1a;          /* texte foncé */
  --ink-light: #f5f7fa;    /* texte sur fond sombre */
  --ink-dim: #5a6378;      /* texte secondaire */
  --ink-dim-light: #9ca3b8;/* texte secondaire sur sombre */
  --accent: #0066ff;       /* bleu électrique */
  --accent-2: #ff8a00;     /* ambre énergie */
  --accent-3: #ff5c33;     /* orange industriel */
  --line: rgba(10, 14, 26, 0.1);
  --line-light: rgba(255, 255, 255, 0.12);
  --display: 'Fraunces', serif;
  --body: 'Space Grotesk', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
html { scroll-behavior: smooth; }
body {
  font-family: var(--body);
  background: var(--bg);
  color: var(--ink);
  line-height: 1.5;
  overflow-x: hidden;
}
img { max-width: 100%; display: block; }
a { color: inherit; text-decoration: none; }

/* Grain overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 100;
  opacity: 0.04;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* =============== NAVIGATION =============== */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 50;
  padding: 1.25rem 2.5rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  backdrop-filter: blur(12px);
  background: rgba(244, 241, 234, 0.85);
  border-bottom: 1px solid var(--line);
}
.logo {
  font-family: var(--display);
  font-size: 1.5rem;
  font-style: italic;
  font-weight: 500;
  letter-spacing: -0.02em;
}
.logo span { color: var(--accent); }
.nav-links {
  display: flex;
  gap: 2rem;
  font-size: 0.85rem;
  font-family: var(--mono);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.nav-links a {
  position: relative;
  padding: 0.25rem 0;
  transition: color 0.3s;
}
.nav-links a::after {
  content: '';
  position: absolute;
  bottom: -2px; left: 0;
  width: 0; height: 1px;
  background: var(--accent);
  transition: width 0.3s ease;
}
.nav-links a:hover { color: var(--accent); }
.nav-links a:hover::after { width: 100%; }
.menu-toggle { display: none; background: none; border: none; color: var(--ink); cursor: pointer; }

/* =============== HERO =============== */
.hero {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  align-items: center;
  padding: 8rem 2.5rem 4rem;
  gap: 4rem;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  top: 20%; right: -10%;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(0,102,255,0.18), transparent 70%);
  filter: blur(40px);
  z-index: 0;
}
.hero::after {
  content: '';
  position: absolute;
  bottom: -10%; left: -5%;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(255,138,0,0.15), transparent 70%);
  filter: blur(60px);
  z-index: 0;
}
.hero-text { position: relative; z-index: 2; }
.hero-eyebrow {
  font-family: var(--mono);
  font-size: 0.85rem;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--accent);
  margin-bottom: 1.5rem;
  display: flex; align-items: center; gap: 0.75rem;
  opacity: 0; animation: fadeUp 0.8s 0.2s forwards;
}
.hero-eyebrow::before {
  content: ''; width: 30px; height: 1px; background: var(--accent);
}
.hero-title {
  font-family: var(--display);
  font-size: clamp(3rem, 7vw, 6rem);
  font-weight: 400;
  line-height: 0.95;
  letter-spacing: -0.04em;
  margin-bottom: 2rem;
  opacity: 0; animation: fadeUp 0.8s 0.4s forwards;
}
.hero-title em {
  font-style: italic;
  color: var(--accent);
  font-weight: 300;
}
.hero-subtitle {
  font-size: 1.15rem;
  color: var(--ink-dim);
  max-width: 480px;
  margin-bottom: 2.5rem;
  opacity: 0; animation: fadeUp 0.8s 0.6s forwards;
}
.hero-cta {
  display: flex; gap: 1rem; flex-wrap: wrap;
  opacity: 0; animation: fadeUp 0.8s 0.8s forwards;
}
.btn {
  padding: 1rem 1.75rem;
  font-family: var(--mono);
  font-size: 0.85rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  border: 1px solid var(--line);
  background: transparent;
  color: var(--ink);
  cursor: pointer;
  transition: all 0.3s ease;
  display: inline-flex; align-items: center; gap: 0.75rem;
}
.btn-primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.btn-primary:hover { background: transparent; color: var(--accent); transform: translateY(-2px); }
.btn:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }
.btn .arrow { transition: transform 0.3s; }
.btn:hover .arrow { transform: translateX(4px); }

/* Hero visual */
.hero-visual {
  position: relative;
  aspect-ratio: 3/4;
  max-width: 480px;
  justify-self: end;
  opacity: 0; animation: fadeUp 1s 0.6s forwards;
}
.hero-photo {
  width: 100%; height: 100%;
  background: linear-gradient(135deg, #1a1f2e, var(--bg-dark));
  border: 1px solid var(--line);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono);
  font-size: 0.8rem;
  color: var(--ink-dim-light);
  text-align: center; padding: 0;
  position: relative;
  overflow: hidden;
}
.hero-photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center 30%;
  display: block;
}
.hero-photo::after {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(0,102,255,0.03) 20px, rgba(0,102,255,0.03) 21px);
}
.hero-badge {
  position: absolute;
  bottom: -20px; left: -20px;
  background: var(--accent);
  color: var(--bg);
  padding: 1rem 1.25rem;
  font-family: var(--mono);
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
